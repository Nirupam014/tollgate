# Tollgate — seed model catalog.
#
# IMPORTANT: prices below are ILLUSTRATIVE DEFAULTS for the analyzer to run
# out of the box. They are NOT a live price feed and will drift. Override them
# for accurate forecasts by pointing the analyzer at your own catalog:
#     tollgate analyze <path> --models my-models.yaml
# or set `models_file:` in .tollgate.yml. Prices are USD per 1,000,000 tokens.
#
# quality_tier: 1 (smallest/cheapest) .. 5 (frontier). Used for model-fit and
# substitution-safety checks.

models:
  # ---- OpenAI ----
  - id: gpt-4o
    provider: openai
    family: gpt-4o
    context_limit: 128000
    max_output: 16384
    quality_tier: 4
    supports_tools: true
    tokenizer: o200k_base
    input_per_mtok: 2.50
    cached_input_per_mtok: 1.25
    output_per_mtok: 10.00
  - id: gpt-4o-mini
    provider: openai
    family: gpt-4o
    context_limit: 128000
    max_output: 16384
    quality_tier: 2
    supports_tools: true
    tokenizer: o200k_base
    input_per_mtok: 0.15
    cached_input_per_mtok: 0.075
    output_per_mtok: 0.60
  - id: gpt-4.1
    provider: openai
    family: gpt-4.1
    context_limit: 1000000
    max_output: 32768
    quality_tier: 4
    supports_tools: true
    tokenizer: o200k_base
    input_per_mtok: 2.00
    cached_input_per_mtok: 0.50
