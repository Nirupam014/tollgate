# Build and publish Tollgate to PyPI when a version tag is pushed.
#
# One-time setup on PyPI (no API token needed afterwards): create the project,
# then add a Trusted Publisher under the project's Publishing settings:
#   Owner: Nirupam014   Repo: tollgate   Workflow: release.yml   Environment: pypi
# https://docs.pypi.org/trusted-publishers/
#
# Release flow: bump version in pyproject.toml + src/tollgate/version.py, tag, push.
#   git tag -a v0.2.0 -m "Tollgate 0.2.0" && git push origin v0.2.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Unit suite
        run: python -m unittest discover -s tests
      - name: Correctness benchmark
        run: python validation/harness.py --strict

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi          # protect with required reviewers if you like
    permissions:
      id-token: write          # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
